<!DOCTYPE html>
<html lang="es">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Práctica de entrevista laboral en inglés</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #f4f8ff 0%, #eef4ff 100%);
        color: #1f2937;
        min-height: 100vh;
        display: grid;

      .card {

        padding: 48px 36px;
        text-align: center;
      }

      h1 {
        font-size: clamp(1.7rem, 3vw, 2.4rem);
        margin: 0 0 16px;
        color: #0f172a;
        line-height: 1.3;
      }

      p {
        font-size: 1.05rem;
        line-height: 1.8;
        margin: 0 0 24px;
        color: #475569;
      }

      .btn {
        display: inline-block;
        text-decoration: none;
        background: #2563eb;
        color: #ffffff;
        padding: 14px 24px;
        border-radius: 999px;
        font-weight: 700;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 24px rgba(37, 99, 235, 0.25);
      }
    </style>
  </head>
